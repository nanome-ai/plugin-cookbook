version: '3'
services:
  websocket_server:
    build:
      context: ./websocket_service
      dockerfile: Dockerfile
    ports:
      - 8000:80
    restart: unless-stopped

  plugin_service:
    build:
      context: ./plugin_service
      dockerfile: ./Dockerfile
    tty: true
    environment:
      - WEBSOCKET_SERVER=ws://websocket_server
      - DEFAULT_URL=http://127.0.0.1:8888
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - NTS_HOST=${NTS_HOST:-}
      - NTS_PORT=${NTS_PORT:-}
      - NTS_KEY=${NTS_KEY:-}
      - ARGS=${ARGS:-}
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-change_me}
      - REDIS_CHANNEL=${REDIS_CHANNEL:-}

    volumes:
      - ./plugin_service:/app
    command: python run.py -a ${NTS_HOST} -p ${NTS_PORT} -r -v
  
  cookbook:
    build:
      context: ./cookbook
      dockerfile: ./Dockerfile
    environment:
      - WEBSOCKET_SERVER=ws://websocket_server
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-change_me}
      - REDIS_CHANNEL=${REDIS_CHANNEL:-}
    ports:
      - 8888:8888
    volumes:
      - ./cookbook:/app
      # Service code is required in cookbook, for stream deserialization.
      # This is a little hacky, but it works.
      - ./plugin_service/service.py:/app/notebooks/service.py
    tty: true
    stdin_open: true
  # Uncomment to use Neo4j integration notebook. 
  # neo4j:
  #   image: neo4j
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   volumes:
  #     - $HOME/neo4j/data:/data